name: govulncheck

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:
  push:
    paths:
      - 'fusion/go.mod'
      - 'fusion/go.sum'
      - '.github/workflows/govulncheck.yml'

permissions:
  contents: read

jobs:
  scan:
    name: scan fusion module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: fusion/go.mod
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: scan fusion
        working-directory: fusion
        run: govulncheck ./...
